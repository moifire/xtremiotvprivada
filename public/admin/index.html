<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MoiStremioTV Panel</title>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
  <div class="topbar">
    <div>
      <h1>MoiStremioTV</h1>
      <p>Panel privado con usuarios, suscripciones, QR y carga M3U por archivo.</p>
    </div>
    <div class="top-actions">
      <span id="redis-pill" class="pill">...</span>
      <button id="btn-demo" class="btn">Modo demo</button>
      <button id="btn-test" class="btn">Test Redis</button>
      <button id="btn-refresh" class="btn">Actualizar</button>
      <button id="btn-logout" class="btn ghost">Salir</button>
    </div>
  </div>

  <div id="login-view" class="center-card hidden">
    <div class="card narrow">
      <h2>Login admin</h2>
      <label>Usuario</label>
      <input id="login-user" value="admin" />
      <label>Contraseña</label>
      <input id="login-pass" type="password" />
      <button id="btn-login" class="btn primary full">Entrar</button>
      <div id="login-msg" class="muted"></div>
    </div>
  </div>

  <div id="app-view" class="grid hidden">
    <div class="left-col">
      <div class="card">
        <h2>Usuario</h2>
        <label>Nombre</label>
        <input id="u-name" placeholder="Ej: Cliente 1">
        <label>Token</label>
        <input id="u-token" placeholder="Vacío = automático">
        <div class="row2">
          <div>
            <label>Plan</label>
            <select id="u-plan">
              <option value="monthly">Mensual</option>
              <option value="quarterly">Trimestral</option>
              <option value="annual">Anual</option>
              <option value="custom">Personalizado</option>
            </select>
          </div>
          <div>
            <label>Máx. conexiones / IPs</label>
            <input id="u-max" type="number" min="1" value="1">
          </div>
        </div>
        <label>Caduca</label>
        <input id="u-exp" type="datetime-local">
        <label class="check"><input id="u-active" type="checkbox" checked> Usuario activo</label>
        <label>Notas</label>
        <textarea id="u-notes" rows="4" placeholder="Observaciones, plan, paquete..."></textarea>
        <div class="actions">
          <button id="btn-save-user" class="btn primary">Guardar usuario</button>
          <button id="btn-clear-user" class="btn">Limpiar</button>
        </div>
        <div id="user-msg" class="muted"></div>
      </div>

      <div class="card">
        <h2>Importar catálogo</h2>
        <label>Archivo M3U / M3U8</label>
        <input id="m3u-file" type="file" accept=".m3u,.m3u8,text/plain">
        <button id="btn-upload-m3u" class="btn">Subir archivo M3U</button>

        <label>JSON manual</label>
        <textarea id="catalog-json" rows="10">{
  "items": []
}</textarea>
        <div class="actions wrap">
          <button id="btn-save-json" class="btn success">Guardar JSON</button>
          <button id="btn-load-json" class="btn">Ver catálogo actual</button>
          <button id="btn-clear-catalog" class="btn danger">Vaciar DB</button>
        </div>
        <div id="catalog-msg" class="muted"></div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <h2>Estado del sistema</h2>
        <div id="system-box" class="muted">Cargando...</div>
      </div>

      <div class="card">
        <h2>Lista de usuarios</h2>
        <div id="users-list"></div>
      </div>

      <div class="card">
        <h2>Catálogo online</h2>
        <div id="catalog-grid" class="catalog-grid"></div>
      </div>
    </div>
  </div>

  <div id="client-modal" class="modal hidden">
    <div class="modal-card">
      <button id="btn-close-modal" class="btn ghost right">Cerrar</button>
      <div id="client-card"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/admin/app.js"></script>
</body>
</html>

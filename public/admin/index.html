<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MoiStremioTV Admin</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #e50914;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.btn-green {
  background: #16a34a;
  color: white;
}

.btn-blue {
  background: #2563eb;
  color: white;
}

#cacheBox {
  margin-top: 15px;
  padding: 10px;
  background: #1a1a1a;
  border-radius: 8px;
  font-size: 13px;
  color: #aaa;
}

</style>
</head>

<body>

<h1>🔥 MoiStremioTV Panel</h1>

<div>
  <button id="testRedisBtn" class="btn-blue">Test Redis</button>
  <button id="refreshCacheBtn" class="btn-green">🔄 Actualizar catálogo</button>
</div>

<div id="cacheBox">
  Versión catálogo: -
</div>

<script>

let catalogVersion = 1;

// 🔄 Cargar versión actual
async function loadCacheInfo() {
  try {
    const res = await fetch('/api/admin/cache-info');
    const data = await res.json();

    catalogVersion = data.version;

    document.getElementById('cacheBox').innerHTML =
      "Versión catálogo: " + data.version +
      " | Actualizado: " +
      (data.updatedAt ? new Date(data.updatedAt).toLocaleString() : "-");

  } catch (e) {
    console.error("Error cache-info", e);
  }
}

// 🚀 Forzar actualización
async function refreshCache() {
  const btn = document.getElementById('refreshCacheBtn');

  try {
    btn.innerHTML = "⏳ Actualizando...";
    btn.disabled = true;

    const res = await fetch('/api/admin/refresh-cache', {
      method: 'POST'
    });

    const data = await res.json();

    catalogVersion = data.version;

    await loadCacheInfo();

    btn.innerHTML = "✅ Actualizado";

    setTimeout(() => {
      btn.innerHTML = "🔄 Actualizar catálogo";
      btn.disabled = false;
    }, 1500);

  } catch (e) {
    alert("Error al actualizar catálogo");
    btn.innerHTML = "🔄 Actualizar catálogo";
    btn.disabled = false;
  }
}

// 🔌 eventos
document.getElementById('refreshCacheBtn').onclick = refreshCache;

// cargar al iniciar
loadCacheInfo();

</script>

</body>
</html>

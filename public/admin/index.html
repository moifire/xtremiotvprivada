<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MoiTube Ultra Pro DB · Admin</title>
  <style>
    :root { --bg:#070b17; --panel:#0f172a; --line:#22304d; --text:#f8fafc; --muted:#94a3b8; --accent:#ef4444; --accent2:#22c55e; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#040814,#0b1220);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:360px 1fr;gap:20px}.card{background:rgba(15,23,42,.92);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    h1,h2,h3{margin:0 0 12px}.muted{color:var(--muted)} input,textarea,select{width:100%;padding:12px 14px;background:#08101f;border:1px solid #263451;border-radius:14px;color:var(--text);margin:8px 0 12px}
    button{border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer}.btn-red{background:#ef4444;color:#fff}.btn-dark{background:#1e293b;color:#fff}.btn-green{background:#22c55e;color:#04110a}.row{display:flex;gap:10px;flex-wrap:wrap}
    .user{border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:12px;background:#0b1324}.small{font-size:13px;line-height:1.45}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all;background:#08101f;border:1px solid var(--line);padding:10px;border-radius:12px}
    .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}.item{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#0c1630,#0d1222);overflow:hidden}.poster{height:280px;background:#0a1430 center/cover no-repeat;display:flex;align-items:flex-end;padding:12px}.badge{font-size:12px;background:#fff;color:#111827;padding:4px 8px;border-radius:999px;font-weight:700}.item-body{padding:14px}.login{max-width:420px;margin:80px auto}.hidden{display:none}.ok{color:#22c55e}.err{color:#f87171}
  </style>
</head>
<body>
  <div id="loginView" class="wrap login hidden">
    <div class="card">
      <h1>Entrar al panel</h1>
      <input id="loginUser" placeholder="Usuario admin">
      <input id="loginPass" type="password" placeholder="Contraseña">
      <button class="btn-red" id="loginBtn">Entrar</button>
      <p id="loginMsg" class="small muted"></p>
    </div>
  </div>

  <div id="appView" class="wrap hidden">
    <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:18px">
      <div>
        <h1>MoiTube ULTRA PRO DB</h1>
        <div class="muted">Panel privado con usuarios, caducidad, límite de conexiones e importación de catálogo.</div>
      </div>
      <div class="row">
        <button class="btn-dark" id="refreshBtn">Actualizar</button>
        <button class="btn-dark" id="logoutBtn">Salir</button>
      </div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>Usuario</h2>
          <input type="hidden" id="userId">
          <label>Nombre</label>
          <input id="name" placeholder="Ej: moifire">
          <label>Token</label>
          <input id="token" placeholder="Se genera automático si lo dejas vacío">
          <label>Caduca</label>
          <input id="expiresAt" type="datetime-local">
          <label>Máx. conexiones / IPs</label>
          <input id="maxConnections" type="number" min="1" value="1">
          <label><input id="enabled" type="checkbox" checked style="width:auto;margin-right:8px"> Usuario activo</label>
          <label>Notas</label>
          <textarea id="notes" rows="4" placeholder="Observaciones, plan, paquete..."></textarea>
          <div class="row">
            <button class="btn-red" id="saveUserBtn">Guardar usuario</button>
            <button class="btn-dark" id="clearFormBtn">Limpiar</button>
          </div>
          <p id="formMsg" class="small muted"></p>
        </div>

        <div class="card" style="margin-top:18px">
          <h2>Importar catálogo</h2>
          <textarea id="catalogJson" rows="6" placeholder='Pega JSON con {"items":[...]}'></textarea>
          <div class="row">
            <button class="btn-green" id="saveCatalogBtn">Guardar JSON</button>
            <button class="btn-dark" id="loadCatalogBtn">Ver catálogo actual</button>
          </div>
          <textarea id="m3uText" rows="6" placeholder="#EXTM3U ..."></textarea>
          <div class="row">
            <button class="btn-dark" id="importM3UBtn">Importar M3U</button>
            <button class="btn-dark" id="clearDbBtn">Vaciar DB</button>
          </div>
          <p id="catalogMsg" class="small muted"></p>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Lista de usuarios</h2>
          <div id="users"></div>
        </div>
        <div class="card" style="margin-top:18px">
          <h2>Catálogo online</h2>
          <div id="catalog" class="catalog-grid"></div>
        </div>
      </div>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);

async function api(path, options = {}) {
  const res = await fetch(path, {
    method: options.method || 'GET',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    credentials: 'include',
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  const text = await res.text();
  let data = {};
  try { data = text ? JSON.parse(text) : {}; } catch {}
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}

function show(view) {
  $('loginView').classList.toggle('hidden', view !== 'login');
  $('appView').classList.toggle('hidden', view !== 'app');
}

function fillForm(user = null) {
  $('userId').value = user?.id || '';
  $('name').value = user?.name || '';
  $('token').value = user?.token || '';
  $('expiresAt').value = user?.expiresAt ? user.expiresAt.slice(0,16) : '';
  $('maxConnections').value = user?.maxConnections || 1;
  $('enabled').checked = user ? !!user.enabled : true;
  $('notes').value = user?.notes || '';
  $('formMsg').textContent = '';
}

function userCard(user) {
  const expires = user.expiresAt ? new Date(user.expiresAt).toLocaleString() : 'Sin caducidad';
  const last = user.lastAccessAt ? new Date(user.lastAccessAt).toLocaleString() : '-';
  const installUrl = `${location.origin}/u/${encodeURIComponent(user.token)}/manifest.json`;
  return `
    <div class="user">
      <h3>${escapeHtml(user.name)}</h3>
      <div class="small muted">${escapeHtml(user.token)}</div>
      <p class="small">Caduca: ${escapeHtml(expires)}<br>Conexiones/IPs: ${(user.ips||[]).length}/${user.maxConnections}<br>Último acceso: ${escapeHtml(last)}<br>IPs: ${escapeHtml((user.ips||[]).join(', ') || '-')}<br>Notas: ${escapeHtml(user.notes || '-')}</p>
      <div class="mono">${escapeHtml(installUrl)}</div>
      <div class="row" style="margin-top:10px">
        <button class="btn-dark" onclick="editUser('${user.id}')">Editar</button>
        <button class="btn-dark" onclick="copyUrl('${installUrl.replace(/'/g, "\\'")}')">Copiar enlace</button>
        <button class="btn-dark" onclick="resetIps('${user.id}')">Reset IPs</button>
        <button class="btn-red" onclick="deleteUser('${user.id}')">Eliminar</button>
      </div>
    </div>`;
}

function itemCard(item) {
  const bg = item.poster || item.background || '';
  return `
    <div class="item">
      <div class="poster" style="background-image:url('${escapeAttr(bg)}')"><span class="badge">${escapeHtml(item.category || 'General')}</span></div>
      <div class="item-body">
        <h3>${escapeHtml(item.name)}</h3>
        <div class="small muted">${escapeHtml(item.type || 'tv')} · ${escapeHtml(item.id)}</div>
        <p class="small">${escapeHtml(item.description || '-')}</p>
      </div>
    </div>`;
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function escapeAttr(text){return String(text ?? '').replace(/'/g, '%27')}

let usersCache = [];

window.editUser = (id) => {
  const user = usersCache.find(u => u.id === id);
  if (user) fillForm(user);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};
window.copyUrl = async (url) => {
  try { await navigator.clipboard.writeText(url); alert('Enlace copiado'); } catch { alert('No se pudo copiar'); }
};
window.resetIps = async (id) => {
  if (!confirm('¿Resetear IPs de este usuario?')) return;
  await api('/api/admin/users/reset-ips', { method: 'POST', body: { id } });
  await loadAll();
};
window.deleteUser = async (id) => {
  if (!confirm('¿Eliminar usuario?')) return;
  await api('/api/admin/users/delete', { method: 'POST', body: { id } });
  await loadAll();
};

async function loadUsers() {
  const data = await api('/api/admin/users');
  usersCache = data.users || [];
  $('users').innerHTML = usersCache.length ? usersCache.map(userCard).join('') : '<p class="muted">No hay usuarios.</p>';
}

async function loadCatalog() {
  const data = await api('/api/admin/catalog');
  const items = data.items || [];
  $('catalog').innerHTML = items.length ? items.map(itemCard).join('') : '<p class="muted">No hay elementos en catálogo.</p>';
  $('catalogJson').value = JSON.stringify({ items }, null, 2);
}

async function loadAll() {
  await Promise.all([loadUsers(), loadCatalog()]);
}

$('loginBtn').onclick = async () => {
  $('loginMsg').textContent = 'Entrando...';
  try {
    await api('/api/admin/login', { method: 'POST', body: { username: $('loginUser').value, password: $('loginPass').value } });
    show('app');
    await loadAll();
  } catch (e) {
    $('loginMsg').textContent = e.message;
    $('loginMsg').className = 'small err';
  }
};

$('logoutBtn').onclick = async () => { await api('/api/admin/logout', { method: 'POST' }); show('login'); };
$('refreshBtn').onclick = loadAll;
$('clearFormBtn').onclick = () => fillForm(null);

$('saveUserBtn').onclick = async () => {
  try {
    const body = {
      id: $('userId').value || undefined,
      name: $('name').value,
      token: $('token').value,
      expiresAt: $('expiresAt').value ? new Date($('expiresAt').value).toISOString() : null,
      maxConnections: Number($('maxConnections').value || 1),
      enabled: $('enabled').checked,
      notes: $('notes').value
    };
    const data = await api('/api/admin/users', { method: 'POST', body });
    $('formMsg').textContent = `Guardado. URL: ${data.installUrl}`;
    $('formMsg').className = 'small ok';
    fillForm(null);
    await loadAll();
  } catch (e) {
    $('formMsg').textContent = e.message;
    $('formMsg').className = 'small err';
  }
};

$('saveCatalogBtn').onclick = async () => {
  try {
    const data = JSON.parse($('catalogJson').value || '{"items":[]}');
    const res = await api('/api/admin/catalog', { method: 'POST', body: data });
    $('catalogMsg').textContent = `Catálogo guardado: ${res.count} items`;
    $('catalogMsg').className = 'small ok';
    await loadCatalog();
  } catch (e) {
    $('catalogMsg').textContent = e.message;
    $('catalogMsg').className = 'small err';
  }
};

$('importM3UBtn').onclick = async () => {
  try {
    const res = await api('/api/admin/catalog/import-m3u', { method: 'POST', body: { text: $('m3uText').value } });
    $('catalogMsg').textContent = `M3U importada: ${res.count} items`;
    $('catalogMsg').className = 'small ok';
    await loadCatalog();
  } catch (e) {
    $('catalogMsg').textContent = e.message;
    $('catalogMsg').className = 'small err';
  }
};

$('clearDbBtn').onclick = async () => {
  if (!confirm('¿Vaciar catálogo?')) return;
  const res = await api('/api/admin/clear-db', { method: 'POST' });
  $('catalogMsg').textContent = res.ok ? 'Catálogo vaciado' : 'Error';
  $('catalogMsg').className = res.ok ? 'small ok' : 'small err';
  await loadCatalog();
};

$('loadCatalogBtn').onclick = loadCatalog;

(async function init() {
  try {
    await api('/api/admin/session');
    show('app');
    await loadAll();
  } catch {
    show('login');
  }
})();
</script>
</body>
</html>

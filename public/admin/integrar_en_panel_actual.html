<!-- PEGA ESTE BLOQUE AL FINAL DE TU PANEL ACTUAL -->
<section style="margin-top:24px;">
  <div style="background:#121933;border:1px solid #25305f;border-radius:16px;padding:18px;">
    <h2 style="margin:0 0 16px 0;color:#fff;">Usuarios privados</h2>
    <p style="color:#a9b3df;margin-top:0;">Admin token fijo: <b>moifire123456</b></p>

    <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px;">
      <input id="ups-name" placeholder="Nombre cliente" style="padding:10px;border-radius:10px;border:1px solid #33407a;background:#0d1430;color:#fff;">
      <input id="ups-token" placeholder="Token (vacío = automático)" style="padding:10px;border-radius:10px;border:1px solid #33407a;background:#0d1430;color:#fff;">
      <input id="ups-expiresAt" placeholder="Caduca (timestamp ms, 0 = sin caducidad)" style="padding:10px;border-radius:10px;border:1px solid #33407a;background:#0d1430;color:#fff;">
      <input id="ups-maxIps" placeholder="Máx IPs" value="1" style="padding:10px;border-radius:10px;border:1px solid #33407a;background:#0d1430;color:#fff;">
    </div>

    <textarea id="ups-notes" placeholder="Notas" style="width:100%;min-height:70px;padding:10px;border-radius:10px;border:1px solid #33407a;background:#0d1430;color:#fff;margin-bottom:12px;"></textarea>

    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
      <label style="color:#fff;"><input type="checkbox" id="ups-enabled" checked> Activo</label>
      <button onclick="upsCreateUser()" style="padding:10px 16px;border-radius:10px;border:1px solid #33407a;background:#2a6df5;color:#fff;cursor:pointer;">Crear usuario</button>
      <button onclick="upsLoadUsers()" style="padding:10px 16px;border-radius:10px;border:1px solid #33407a;background:#1d274f;color:#fff;cursor:pointer;">Recargar</button>
    </div>

    <div style="overflow:auto;">
      <table style="width:100%;border-collapse:collapse;color:#fff;">
        <thead>
          <tr>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Nombre</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Token</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">URL privada</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Activo</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Caduca</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">IPs</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Máx</th>
            <th style="text-align:left;padding:10px;border-bottom:1px solid #25305f;">Acciones</th>
          </tr>
        </thead>
        <tbody id="ups-users-body"></tbody>
      </table>
    </div>
  </div>
</section>

<script>
localStorage.setItem('admin_token', 'moifire123456');

async function upsApi(method, url, body) {
  const token = localStorage.getItem('admin_token') || '';
  const res = await fetch(url, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}

async function upsCopy(text) {
  try { await navigator.clipboard.writeText(text); alert('Enlace copiado'); }
  catch { prompt('Copia este enlace:', text); }
}

async function upsLoadUsers() {
  try {
    const data = await upsApi('GET', '/api/admin/users');
    const tbody = document.getElementById('ups-users-body');
    tbody.innerHTML = '';
    (data.users || []).forEach(u => {
      const tr = document.createElement('tr');
      const safeUrl = (u.installUrl || '').replace(/'/g, "\\'");
      tr.innerHTML = `
        <td style="padding:10px;border-bottom:1px solid #25305f;">${u.name || ''}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;word-break:break-all;">${u.token || ''}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;"><div style="max-width:280px;word-break:break-all;color:#bcd0ff;font-size:12px;">${u.installUrl || ''}</div><button onclick="upsCopy('${safeUrl}')" style="margin-top:8px;padding:8px 12px;border-radius:10px;border:1px solid #33407a;background:#1f9d55;color:#fff;cursor:pointer;">Copiar</button></td>
        <td style="padding:10px;border-bottom:1px solid #25305f;">${u.enabled ? 'Sí' : 'No'}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;">${u.expiresAt ? new Date(Number(u.expiresAt)).toLocaleString() : 'Sin caducidad'}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;">${(u.ips || []).join('<br>') || '-'}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;">${u.maxIps || 0}</td>
        <td style="padding:10px;border-bottom:1px solid #25305f;"><button onclick="upsToggle('${u.token}', ${u.enabled ? 'false' : 'true'})" style="padding:8px 10px;border-radius:10px;border:1px solid #33407a;background:#2a6df5;color:#fff;cursor:pointer;">${u.enabled ? 'Desactivar' : 'Activar'}</button><button onclick="upsResetIps('${u.token}')" style="padding:8px 10px;border-radius:10px;border:1px solid #33407a;background:#1d274f;color:#fff;cursor:pointer;margin-left:6px;">Reset IPs</button><button onclick="upsDelete('${u.token}')" style="padding:8px 10px;border-radius:10px;border:1px solid #33407a;background:#1d274f;color:#fff;cursor:pointer;margin-left:6px;">Borrar</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) { alert(e.message); }
}

async function upsCreateUser() {
  try {
    await upsApi('POST', '/api/admin/users', {
      name: document.getElementById('ups-name').value.trim(),
      token: document.getElementById('ups-token').value.trim(),
      enabled: document.getElementById('ups-enabled').checked,
      expiresAt: document.getElementById('ups-expiresAt').value.trim() || 0,
      maxIps: document.getElementById('ups-maxIps').value.trim() || 0,
      notes: document.getElementById('ups-notes').value.trim()
    });
    upsLoadUsers();
  } catch (e) { alert(e.message); }
}

async function upsToggle(token, enabled) { try { await upsApi('PUT', '/api/admin/users', { token, enabled }); upsLoadUsers(); } catch (e) { alert(e.message); } }
async function upsResetIps(token) { try { await upsApi('PUT', '/api/admin/users', { token, ips: [] }); upsLoadUsers(); } catch (e) { alert(e.message); } }
async function upsDelete(token) { if (!confirm('¿Borrar usuario?')) return; try { await upsApi('DELETE', '/api/admin/users', { token }); upsLoadUsers(); } catch (e) { alert(e.message); } }

upsLoadUsers();
</script>

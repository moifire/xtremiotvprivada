<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ULTRA PRIVATE PRO MAX FIXED</title>
<style>
body{font-family:Arial,sans-serif;background:#0b1020;color:#fff;margin:0;padding:20px}
.wrap{max-width:1280px;margin:0 auto}
.card{background:#121933;border:1px solid #25305f;border-radius:16px;padding:18px;margin-bottom:18px}
input,textarea,button{border-radius:10px;border:1px solid #33407a;padding:10px;font-size:14px}
input,textarea{background:#0d1430;color:#fff;width:100%;box-sizing:border-box}
button{background:#2a6df5;color:#fff;cursor:pointer}
button.secondary{background:#1d274f}
button.copy{background:#1f9d55}
button.warn{background:#d97706}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #25305f;text-align:left;font-size:14px;vertical-align:top}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.ok{color:#67e08a}.bad{color:#ff7a7a}
.urlbox{max-width:360px;word-break:break-all;font-size:12px;color:#bcd0ff}
</style>
</head>
<body>
<div class="wrap">
<h1>ULTRA PRIVATE PRO MAX FIXED</h1>

<div class="card">
  <h3>Admin token</h3>
  <div class="row">
    <input id="adminToken" placeholder="Bearer token de admin">
    <button onclick="saveToken()">Guardar token</button>
    <button class="secondary" onclick="loadUsers()">Recargar</button>
  </div>
</div>

<div class="card">
  <h3>Crear usuario</h3>
  <div class="grid">
    <div><input id="name" placeholder="Nombre del cliente"></div>
    <div><input id="token" placeholder="Token (vacío = automático)"></div>
    <div><input id="expiresAt" placeholder="Caduca (ms timestamp o vacío)"></div>
    <div><input id="maxIps" placeholder="Máx IPs (0 = ilimitado)"></div>
    <div style="grid-column:1/-1"><textarea id="notes" placeholder="Notas"></textarea></div>
  </div>
  <div class="row" style="margin-top:10px">
    <label><input type="checkbox" id="enabled" checked> Activo</label>
    <button onclick="createUser()">Crear usuario</button>
  </div>
</div>

<div class="card">
  <h3>Usuarios</h3>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Token</th>
        <th>Ruta privada</th>
        <th>URL privada</th>
        <th>Activo</th>
        <th>Caduca</th>
        <th>IPs</th>
        <th>Máx</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
</div>

<script>
function getToken(){ return localStorage.getItem('admin_token') || ''; }
function saveToken(){ localStorage.setItem('admin_token', document.getElementById('adminToken').value.trim()); alert('Token guardado'); }
document.getElementById('adminToken').value = getToken();

async function api(method, url, body){
  const res = await fetch(url, {
    method,
    headers: {'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Error');
  return data;
}
async function copyText(text){ try{ await navigator.clipboard.writeText(text); alert('Copiado'); } catch { prompt('Copia este enlace:', text); } }

async function loadUsers(){
  try{
    const data = await api('GET', '/api/admin/users');
    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = '';
    (data.users || []).forEach(u => {
      const safeUrl = (u.installUrl || '').replace(/'/g, "\\'");
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${u.name || ''}</td>
        <td style="word-break:break-all">${u.token || ''}</td>
        <td>${u.routeKey || ''}</td>
        <td><div class="urlbox">${u.installUrl || ''}</div><div style="margin-top:8px"><button class="copy" onclick="copyText('${safeUrl}')">Copiar enlace</button></div></td>
        <td class="${u.enabled ? 'ok':'bad'}">${u.enabled ? 'Sí':'No'}</td>
        <td>${u.expiresAt ? new Date(Number(u.expiresAt)).toLocaleString() : 'Sin caducidad'}</td>
        <td>${(u.ips || []).join('<br>') || '-'}</td>
        <td>${u.maxIps || 0}</td>
        <td>
          <button onclick="toggleUser('${u.token}', ${u.enabled ? 'false':'true'})">${u.enabled ? 'Desactivar':'Activar'}</button>
          <button class="secondary" onclick="resetIps('${u.token}')">Reset IPs</button>
          <button class="warn" onclick="extend30('${u.token}')">+30 días</button>
          <button class="secondary" onclick="regenRoute('${u.token}')">Nueva ruta</button>
          <button class="secondary" onclick="removeUser('${u.token}')">Borrar</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }catch(e){ alert(e.message); }
}
async function createUser(){
  try{
    await api('POST', '/api/admin/users', {
      name: document.getElementById('name').value.trim(),
      token: document.getElementById('token').value.trim(),
      enabled: document.getElementById('enabled').checked,
      expiresAt: document.getElementById('expiresAt').value.trim() || 0,
      maxIps: document.getElementById('maxIps').value.trim() || 0,
      notes: document.getElementById('notes').value.trim()
    });
    loadUsers();
  }catch(e){ alert(e.message); }
}
async function toggleUser(token, enabled){ try{ await api('PUT','/api/admin/users',{token,enabled}); loadUsers(); }catch(e){ alert(e.message); } }
async function resetIps(token){ try{ await api('PUT','/api/admin/users',{token,ips:[]}); loadUsers(); }catch(e){ alert(e.message); } }
async function extend30(token){ try{ await api('PUT','/api/admin/users',{token,extend30days:true}); loadUsers(); }catch(e){ alert(e.message); } }
async function regenRoute(token){ try{ await api('PUT','/api/admin/users',{token,regenerateRouteKey:true}); loadUsers(); }catch(e){ alert(e.message); } }
async function removeUser(token){ if(!confirm('¿Borrar usuario?')) return; try{ await api('DELETE','/api/admin/users',{token}); loadUsers(); }catch(e){ alert(e.message); } }
loadUsers();
</script>
</body>
</html>
